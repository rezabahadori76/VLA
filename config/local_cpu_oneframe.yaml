system:
  run_name: phase1_home_world_model_cpu
  device: cpu
  max_frames: 1
  frame_stride: 1
  strict_real_models: false
slam:
  backend: rtabmap
  use_depth: false
  require_depth: false
  map_resolution: 0.05
  camera_intrinsics:
    width: 1920
    height: 1080
    fx: 1000.0
    fy: 1000.0
    cx: 960.0
    cy: 540.0
  rtabmap:
    executable: /workspace/phase1/third_party/rtabmap/build/bin/rtabmap-rgbd_dataset
    db_path: outputs/rtabmap.db
  orbslam3:
    executable: ./ORB_SLAM3/Examples/Monocular/mono_tum
    vocabulary_path: ./ORB_SLAM3/Vocabulary/ORBvoc.txt
    settings_path: ./ORB_SLAM3/Examples/Monocular/TUM1.yaml
detection:
  model_name: models/grounding_dino_tiny
  use_real_model: true
  device: cpu
  box_threshold: 0.45
  text_threshold: 0.35
  prompt: chair . table . door . bed . sofa . fridge . sink . cabinet . lamp
segmentation:
  model_type: vit_h
  checkpoint: models/sam/sam_vit_h_4b8939.pth
  use_real_model: true
  device: cpu
semantic:
  model_name: models/qwen2_vl_2b
  use_real_model: true
  device: cpu
  max_new_tokens: 120
  room_labels:
  - kitchen
  - bedroom
  - living_room
  - bathroom
  - hallway
  - office
  - dining_room
scene_graph:
  include_room_nodes: true
  relation_threshold_px: 60
memory:
  backend: faiss
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  top_k: 5
visualization:
  draw_masks: true
  draw_boxes: true
  export_graph_png: true
  pointcloud_sample_step: 24
  video_fps: 10
  simulation3d_max_points: 18000
